# =====================================================
# SERVER
# =====================================================
server.port=8080
server.servlet.context-path=/

# =====================================================
# DATABASE
# =====================================================
spring.datasource.url=jdbc:mysql://localhost:3306/yc_interior?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =====================================================
# JPA / HIBERNATE
# =====================================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# =====================================================
# JWT
# =====================================================
app.jwt.secret=YcInteriorAdminSecretKey2024SuperSecureBase64EncodedStringForJWT
app.jwt.expiration=86400000

# =====================================================
# FILE UPLOAD
# =====================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB
app.upload.dir=uploads
app.upload.base-url=http://localhost:8080/files

# =====================================================
# LOGGING
# =====================================================
logging.level.com.yc.interior=INFO
logging.level.org.springframework.security=WARN

# =====================================================
# SWAGGER
# =====================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tags-sorter=alpha
