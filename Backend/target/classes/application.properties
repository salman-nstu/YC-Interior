# =====================================================
# SERVER
# =====================================================
server.port=8080
server.servlet.context-path=/

# =====================================================
# DATABASE
# =====================================================
spring.datasource.url=jdbc:mysql://localhost:3306/yc_interior?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =====================================================
# JPA / HIBERNATE
# =====================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# =====================================================
# JWT
# =====================================================
app.jwt.secret=YcInt3r10rAdm1nS3cr3tK3y2024Sup3rS3cur3B4s364Enc0d3dStr1ngF0rJWT!@#$%^&*()_+
app.jwt.expiration=3600000
app.jwt.refresh-expiration=604800000

# =====================================================
# FILE UPLOAD
# =====================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB
app.upload.dir=uploads
app.upload.base-url=http://localhost:8080/files

# =====================================================
# LOGGING
# =====================================================
logging.level.com.yc.interior=INFO
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=INFO
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=INFO
logging.level.org.springframework.boot=INFO

# =====================================================
# SWAGGER
# =====================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tags-sorter=alpha
