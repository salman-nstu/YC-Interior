# =====================================================
# SERVER
# =====================================================
# LOCAL: Development server port
# PRODUCTION: Render uses PORT environment variable
server.port=${PORT:8080}
server.servlet.context-path=/

# =====================================================
# DATABASE
# =====================================================
# LOCAL: Development MySQL on localhost
# PRODUCTION: Railway MySQL with environment variables
spring.datasource.url=jdbc:mysql://${RAILWAY_MYSQL_HOST:localhost}:${RAILWAY_MYSQL_PORT:3306}/${RAILWAY_MYSQL_DATABASE:yc_interior}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${RAILWAY_MYSQL_USER:root}
spring.datasource.password=${RAILWAY_MYSQL_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =====================================================
# JPA / HIBERNATE
# =====================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# =====================================================
# JWT
# =====================================================
app.jwt.secret=${JWT_SECRET:YcInt3r10rAdm1nS3cr3tK3y2024Sup3rS3cur3B4s364Enc0d3dStr1ngF0rJWT!@#$%^&*()_+}
app.jwt.expiration=3600000
app.jwt.refresh-expiration=604800000

# =====================================================
# FILE UPLOAD
# =====================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB
# LOCAL: Development file upload directory
# PRODUCTION: Render uses /tmp/uploads (temporary storage)
app.upload.dir=${UPLOAD_DIR:uploads}
# LOCAL: Development file base URL
# PRODUCTION: Render backend URL from environment
app.upload.base-url=${FILE_BASE_URL:http://localhost:8080/files}

# =====================================================
# LOGGING
# =====================================================
logging.level.com.yc.interior=INFO
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=INFO
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=INFO
logging.level.org.springframework.boot=INFO

# =====================================================
# SWAGGER
# =====================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tags-sorter=alpha
